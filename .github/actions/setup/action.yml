name: Setup pnpm + Node + install
description: Install pnpm 10.6.2 and Node 22 with pnpm-cached dependencies for the Dualmark monorepo.

inputs:
  install:
    description: Whether to run `pnpm install --frozen-lockfile`
    required: false
    default: "true"
  registry-url:
    description: Optional npm registry URL (set for publish workflows)
    required: false
    default: ""

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@v4
      with:
        version: 10.6.2

    - uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: pnpm
        registry-url: ${{ inputs.registry-url }}

    - if: inputs.install == 'true'
      shell: bash
      run: pnpm install --frozen-lockfile
