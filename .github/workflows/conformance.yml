name: Conformance (E2E)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - "packages/**"
      - "examples/**"
      - "spec/**"
      - ".github/workflows/conformance.yml"

env:
  TURBO_TELEMETRY_DISABLED: 1
  CI: true

jobs:
  astro-blog:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10.6.2 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo run build --filter='@dualmark/*'
      - name: Build astro-blog example
        run: pnpm --filter dualmark-example-astro-blog build
      - name: Verify astro-blog under astro dev
        working-directory: examples/astro-blog
        run: |
          ./node_modules/.bin/astro dev --port 4321 &
          DEV_PID=$!
          sleep 10
          node ../../packages/cli/dist/cli.js verify http://localhost:4321/blog/hello-world
          kill $DEV_PID

  astro-cloudflare-full:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10.6.2 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo run build --filter='@dualmark/*'
      - name: Build astro-cloudflare-full
        run: pnpm --filter dualmark-example-astro-cloudflare-full build
      - name: Verify under wrangler dev (full negotiation)
        working-directory: examples/astro-cloudflare-full
        run: |
          ./node_modules/.bin/wrangler dev --port 8787 --local --no-bundle=false &
          WRANGLER_PID=$!
          sleep 15
          node ../../packages/cli/dist/cli.js verify http://localhost:8787/blog/edge-aeo
          kill $WRANGLER_PID

  nextjs-app-router:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10.6.2 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo run build --filter='@dualmark/*'
      - name: Run nextjs-app-router under next dev
        working-directory: examples/nextjs-app-router
        run: |
          ./node_modules/.bin/next dev --port 3000 &
          NEXT_PID=$!
          sleep 15
          node ../../packages/cli/dist/cli.js verify http://localhost:3000/posts/hello
          kill $NEXT_PID
