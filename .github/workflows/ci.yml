name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  TURBO_TELEMETRY_DISABLED: 1
  CI: true

jobs:
  build-test-typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.2
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Run tests
        run: pnpm test

      - name: Typecheck
        run: pnpm typecheck

      - name: CLI smoke test
        run: |
          node packages/cli/dist/cli.js --help
          node packages/cli/dist/cli.js verify --help

      - name: Verify spec docs are in sync
        working-directory: apps/docs
        run: |
          pnpm sync-spec
          if ! git diff --quiet content/docs/spec/; then
            echo "::error::apps/docs/content/docs/spec/ is out of sync with /spec/. Run 'pnpm --filter dualmark-docs sync-spec' and commit." >&2
            git diff --stat content/docs/spec/ >&2
            exit 1
          fi
